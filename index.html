<!DOCTYPE html>
<html>
<head>
<title>🧠 Brain Upgrade</title>

<style>
body{
margin:0;
font-family: 'Orbitron', sans-serif;
background: radial-gradient(circle at top, #0f2027, #203a43, #2c5364);
color:white;
text-align:center;
}

/* glowing card */
.card{
margin-top:50px;
padding:25px;
width:320px;
background: rgba(255,255,255,0.05);
border-radius:20px;
backdrop-filter: blur(15px);
box-shadow: 0 0 30px rgba(0,255,255,0.3);
display:inline-block;
}

/* glowing text */
h1{
color:#00f7ff;
text-shadow:0 0 15px #00f7ff;
}

/* neon input */
input{
padding:12px;
margin:8px;
border-radius:10px;
border:none;
outline:none;
width:80%;
background:#111;
color:#00f7ff;
box-shadow:0 0 10px #00f7ff;
}

/* neon button */
button{
padding:12px 20px;
margin:10px;
border-radius:10px;
border:none;
background:#00f7ff;
color:black;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 15px #00f7ff;
transition:0.3s;
}

button:hover{
background:#00c3cc;
box-shadow:0 0 25px #00f7ff;
}

/* stats */
#stats{
margin:10px;
font-size:14px;
color:#0ff;
}

/* question glow */
#question{
font-size:24px;
margin:15px;
text-shadow:0 0 10px #00f7ff;
}

/* result */
#result{
margin-top:10px;
font-weight:bold;
}

</style>
</head>

<body>

<h1>🧠 Brain Upgrade</h1>

<div class="card">

<div id="login">
<input id="username" placeholder="Enter your name">
<br>
<button onclick="start()">Start</button>
</div>

<div id="game" style="display:none;">
<p id="stats"></p>

<h2 id="question"></h2>

<input id="answer" placeholder="Your answer">
<br>

<button onclick="check()">Submit</button>

<p id="result"></p>
</div>

</div>

<script>
let user="";
let score=0;
let level=1;
let lives=3;
let correctAnswer=0;
let locked=false;

function start(){
user=document.getElementById("username").value;
if(!user) return alert("Enter name!");

document.getElementById("login").style.display="none";
document.getElementById("game").style.display="block";

updateUI();
ask();
}

function rand(min,max){
return Math.floor(Math.random()*(max-min+1))+min;
}

function ask(){
locked=false;

let x=rand(1,20), y=rand(1,20);
correctAnswer=x+y;

document.getElementById("question").innerText = x+" + "+y;
document.getElementById("answer").value="";
document.getElementById("result").innerText="";
}

function check(){
if(locked) return;
locked=true;

let ans=document.getElementById("answer").value;

if(ans == correctAnswer){
score++;
if(score%5===0) level++;
document.getElementById("result").innerText="✅ Correct!";
}else{
lives--;
document.getElementById("result").innerText=
"❌ Wrong! Answer: "+correctAnswer;
}

if(lives<=0){
alert("Game Over!");
score=0; level=1; lives=3;
}

updateUI();

setTimeout(()=>ask(),800);
}

function updateUI(){
document.getElementById("stats").innerText=
"🏆 Level "+level+" | ❤️ "+lives+" | Score "+score;
}
</script>

</body>
</html>
